<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="150" cy="150" r="150"/></clipPath>
  </defs>
  <circle cx="150" cy="150" r="150" fill="url(#bg)"/>
  <!-- body -->
  <ellipse cx="150" cy="230" rx="70" ry="55" fill="url(#icon)" opacity=".55"/>
  <!-- head -->
  <circle cx="150" cy="118" r="52" fill="url(#icon)" opacity=".75"/>
  <!-- initials -->
  <text x="150" y="130" text-anchor="middle" dominant-baseline="middle"
        font-family="Sora, Inter, sans-serif" font-weight="700" font-size="36" fill="#fff" opacity=".9">BC</text>
  <!-- hint text -->
  <text x="150" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="12"
        fill="#14b8a6" opacity=".8">Remplace par ta photo</text>
</svg>
